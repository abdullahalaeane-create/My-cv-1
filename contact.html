<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معي </title>
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .contact-container {
            max-width: 400px;
            margin: 0 auto;
        }

        /* تنسيق رابط التواصل كبطاقة */
        .contact-link {
            display: flex;
            align-items: center; /* موازنة الأيقونة مع النص */
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .contact-link:hover {
            transform: translateY(-3px); /* رفعة بسيطة عند اللمس */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* تنسيق الأيقونة */
        .icon {
            width: 30px;
            height: 30px;
            margin-left: 15px; /* مسافة بين الأيقونة والنص */
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #0056b3;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>قنوات التواصل 📞</h1>

       <div class="contact-container">
        <a href="https://wa.me/967774049451" class="contact-link" target="_blank">
            <span class="icon-emoji">💬</span>
            <span>تواصل عبر واتساب</span>
        </a>

        <a href="https://instagram.com/AlFakhr.i" class="contact-link" target="_blank">
            <span class="icon-emoji">📸</span>
            <span>تابعني على إنستغرام</span>
        </a>

        <a href="mailto:abdullahalaeane@gmail.com" class="contact-link">
            <span class="icon-emoji">📧</span>
            <span>بريدي الالكتروني</span>
        </a>

        <a href="tel:967774049451" class="contact-link">
            <span class="icon-emoji">📞</span>
            <span>اتصال مباشر</span>
        </a>
    </div>



    <a href="index.html"".src=""" class="back-btn">← العودة للرئيسية</a>

</body>
</html>
